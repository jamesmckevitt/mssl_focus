name: Build and release

# Fires when you push a version tag  (e.g. git tag v1.2 && git push --tags).
# Can also be triggered manually from the Actions tab for a test build.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact: dist/mssl_filter_inspector
          - os: windows-latest
            label: windows
            artifact: dist/mssl_filter_inspector.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pyinstaller

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller
          --onefile
          --name mssl_filter_inspector
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          filter_inspector.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name mssl_filter_inspector
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          filter_inspector.py

      # Tag push → create/update the GitHub Release and attach the binary
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true

      # Manual dispatch → save as a workflow artifact so you can still test builds
      - name: Upload artifact (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mssl_filter_inspector_${{ matrix.label }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
