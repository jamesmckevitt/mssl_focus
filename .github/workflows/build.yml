name: Build and release

# Fires on new version tags.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact: dist/mssl_focus
          - os: windows-latest
            label: windows
            artifact: dist/mssl_focus.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install tkinter (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow numpy pyinstaller rawpy opencv-python-headless

      - name: Prepare build files (icon, version info, _version.txt)
        run: python build_prepare.py "${{ github.ref_name }}"

      - name: Inject license module
        shell: bash
        env:
          LICENSE_MODULE: ${{ secrets.LICENSE_MODULE }}
        run: |
          mkdir -p src
          echo "$LICENSE_MODULE" > src/license.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller
          --onefile
          --name mssl_focus
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --collect-all rawpy
          --collect-all cv2
          --add-data "_version.txt:."
          --add-data "app.ico:."
          --add-data "app.png:."
          --icon app.png
          mssl_focus.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --onefile
          --windowed
          --name mssl_focus
          --hidden-import tkinter
          --hidden-import tkinter.ttk
          --collect-all rawpy
          --collect-all cv2
          --add-data "_version.txt:."
          --add-data "app.ico;."
          --add-data "app.png;."
          --icon app.ico
          --version-file file_version_info.txt
          mssl_focus.py

      # Tag push -> create/update the GitHub Release and attach the binary
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true

      # Manual dispatch -> save as a workflow artifact so can still test builds
      - name: Upload artifact (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mssl_focus_${{ matrix.label }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
